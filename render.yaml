services:
  - type: web
    name: deck-director-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        value: https://deck-director-app.onrender.com

  - type: web
    name: deck-director-app
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_BASE
        value: https://deck-director-api.onrender.com
